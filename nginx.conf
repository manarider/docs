# /etc/nginx/sites-available/docs.nsm.go.th
# Digital Document Archive — เทศบาลนครนครสวรรค์

upstream docs_backend {
    least_conn;
    server 127.0.0.1:4040;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name app.nsm.go.th;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.nsm.go.th;

    # SSL (แก้ path ให้ตรงกับ cert จริง)
    ssl_certificate     /etc/ssl/certs/nsm.go.th.crt;
    ssl_certificate_key /etc/ssl/private/nsm.go.th.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    client_max_body_size 55M;

    # Proxy API → Node.js
    location /api/ {
        proxy_pass         http://docs_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # React frontend (SPA)
    location / {
        root   /data/archives/frontend/dist;
        index  index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }
}
